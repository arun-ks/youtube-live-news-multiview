<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YouTube Live News Multiview</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="topbar">
  <nav class="main-nav" aria-label="Main views">
    <button class="tab active" data-tab="feeds">Feeds</button>
    <button class="tab" data-tab="monitor">Monitor</button>
  </nav>
  <div id="monitor-controls" class="monitor-controls hidden">
    <button id="monitor-refresh">Refresh</button>
    <button id="mute-all">Mute all</button>
    <span id="monitor-summary"></span>
  </div>
</header>
<main>
  <section id="feeds-view" class="view">
    <div id="first-run" class="panel hidden"></div>
    <div class="toolbar panel">
      <input id="feed-name" placeholder="Display name">
      <input id="feed-url" placeholder="YouTube @handle, channel, or video URL">
      <button id="add-feed">Add feed</button>
      <button id="refresh-feeds">Check enabled feeds</button>
      <select id="refresh-mode" aria-label="Refresh mode">
        <option value="economy">Economy</option>
        <option value="normal">Normal</option>
        <option value="manual">Manual only</option>
      </select>
    </div>
    <div id="status" class="status" aria-live="polite"></div>
    <div id="feed-list" class="feed-list"></div>
    <div class="panel secondary-actions">
      <button id="export-config">Export configuration</button>
      <label class="button-like">Import configuration<input id="import-config" type="file" accept="application/json" hidden></label>
      <button id="reset-app" class="danger">Reset local data</button>
    </div>
  </section>

  <section id="monitor-view" class="view hidden">
    <div id="monitor-grid" class="monitor-grid"></div>
  </section>
</main>
<script type="module" src="/js/app.js"></script>
</body>
</html>
